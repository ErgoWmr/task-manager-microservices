spring.application.name=tasks-service
server.port=8080

# Appel inter-service (DNS K8s par défaut)
users-service.url=${USERS_SERVICE_URL:http://users-service:8080}

# Datasource : H2 in-memory par défaut, surchargeable par env vars pour Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:tasksdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (utile en dev local seulement)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

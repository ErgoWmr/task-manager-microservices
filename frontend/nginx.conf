server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback : toute route inconnue retourne index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long pour les assets versionnés (Vite ajoute un hash au nom)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Healthcheck pour les probes K8s
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}

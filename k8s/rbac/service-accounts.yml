# Un ServiceAccount dédié par workload (principe du moindre privilège).
# Sans ces SA explicites, tous les pods utiliseraient le SA "default" du namespace,
# avec les mêmes droits — c'est l'anti-pattern combattu par RBAC.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: users-service-sa
  namespace: default
  labels:
    app: users-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tasks-service-sa
  namespace: default
  labels:
    app: tasks-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: default
  labels:
    app: frontend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: default
  labels:
    app: postgres
